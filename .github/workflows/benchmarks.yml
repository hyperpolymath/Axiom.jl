# SPDX-License-Identifier: PMPL-1.0-or-later
name: Performance Benchmarks

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly benchmark run
    - cron: '0 2 * * 0'
  workflow_dispatch:

permissions: read-all

jobs:
  julia-benchmarks:
    name: Julia Benchmarks
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4

      - uses: julia-actions/setup-julia@4c0cb0fce8556fdb04a90347310e5db8b1f98fb9 # v2
        with:
          version: '1.10'

      - uses: julia-actions/cache@e33b4bfa0ea7cd9caedd7cb82b0e36956ef40285 # v2

      - name: Install dependencies
        run: |
          julia --project=benchmark -e 'using Pkg; Pkg.instantiate()'

      - name: Run Julia benchmarks
        run: |
          julia --project=benchmark benchmark/benchmarks.jl > benchmark_results.txt

      - name: Upload Julia results
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: julia-benchmark-results
          path: |
            benchmark/results_*.json
            benchmark_results.txt

  rust-benchmarks:
    name: Rust Benchmarks
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@6d9817901c499d6b02debbb57edb38d33daa680b # stable
        with:
          toolchain: stable

      - name: Cache Cargo
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust/target
          key: ${{ runner.os }}-cargo-bench-${{ hashFiles('rust/Cargo.lock') }}

      - name: Run Rust benchmarks
        working-directory: rust
        run: cargo bench --bench backend_benchmarks | tee ../rust_bench_results.txt

      - name: Upload Rust results
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: rust-benchmark-results
          path: |
            rust/target/criterion/
            rust_bench_results.txt

  regression-check:
    name: Regression Detection
    runs-on: ubuntu-latest
    needs: [julia-benchmarks, rust-benchmarks]

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v4

      - name: Download Julia results
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
        with:
          name: julia-benchmark-results
          path: benchmark/

      - name: Download Rust results
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
        with:
          name: rust-benchmark-results
          path: rust/target/criterion/

      - uses: julia-actions/setup-julia@4c0cb0fce8556fdb04a90347310e5db8b1f98fb9 # v2
        with:
          version: '1.10'

      - name: Check for regressions
        run: |
          if [ -f benchmark/baseline.json ]; then
            julia --project=benchmark -e '
              using BenchmarkTools, JSON
              include("benchmark/benchmarks.jl")
              latest = sort(filter(f -> startswith(f, "results_"), readdir("benchmark")), rev=true)[1]
              results = BenchmarkTools.load("benchmark/$latest")[1]
              passed = check_regression(results, "benchmark/baseline.json")
              exit(passed ? 0 : 1)
            '
          else
            echo "No baseline found, skipping regression check"
          fi

      - name: Update baseline (main branch only)
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          latest=$(ls -t benchmark/results_*.json | head -1)
          if [ -f "$latest" ]; then
            cp "$latest" benchmark/baseline.json
            echo "Updated baseline from $latest"
          fi

      - name: Commit baseline update
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add benchmark/baseline.json
          if git diff --staged --quiet; then
            echo "No baseline changes"
          else
            git commit -m "Update benchmark baseline [skip ci]"
            git push
          fi
